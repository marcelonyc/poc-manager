name: Deploy To test environment

on:
  release:
    on:
      release:
        types: [published]
  workflow_dispatch:

permissions:
  actions: read # for detecting the Github Actions environment.
  id-token: write # for creating OIDC tokens for signing.
  contents: read

jobs:
  deploy:
    runs-on: gh-runner-poc-manager
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Execute Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          # username: ${{ secrets.SSH_USER }}
          # key: ${{ secrets.SSH_PRIVATE_KEY }}
          # proxy_command: |
          #   cloudflared access ssh --hostname ${{ secrets.SSH_HOST }} --id ${{ secrets.CF_CLIENT_ID }} --secret ${{ secrets.CF_CLIENT_SECRET }}
          script: |
            REPO_NAME=${{ github.event.repository.name }}
            # 1. Exit  if directory doesn't exist
            cd ~/$REPO_NAME 
            if [ $? -ne 0 ]; then
              echo "Directory ~/$REPO_NAME does not exist. Exiting."
              exit 1
            fi

            # 2. Download ONLY the docker-compose file
            # Note: Use GITHUB_TOKEN for private repos
            wget -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"  \
            -O docker-compose.yml $(gh api repos/${{ github.actor }}/${{ github.repository.name }}/contents/docker-compose.prod.yml | jq -r .download_url)


            # 3. Authenticate and Setup .env
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Ensure .env exists (or create it) before sed
            if [ ! -f .env ]; then
              echo ".env file not found"
              exit 1
            else
              sed -i "s/^VERSION=.*/VERSION=${{ github.ref_name }}/" .env
            fi

            # 4. Pull and Deploy
            docker compose pull
            docker compose up -d --remove-orphans