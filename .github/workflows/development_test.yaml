name: Deploy To test environment

on:
  release:
    on:
      release:
        types: [published]
  workflow_dispatch:
    inputs:
          version:
            description: 'Version to deploy (Manual only)'
            required: true
            default: '1.0.0'

permissions:
  actions: read # for detecting the Github Actions environment.
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: gh-runner-poc-manager
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set the version 
        id: vars
        run: |
          # If triggered manually, use the input. 
          # If triggered by push, use a default (like 'latest' or a short SHA)
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "APP_VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
          else
            echo "APP_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          fi

      - name: Execute Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # proxy_command: |
          #   cloudflared access ssh --hostname ${{ secrets.SSH_HOST }} --id ${{ secrets.CF_CLIENT_ID }} --secret ${{ secrets.CF_CLIENT_SECRET }}
          script: |
            REPO_NAME=${{ github.event.repository.name }}
            # 1. Exit  if directory doesn't exist
            cd ~/$REPO_NAME

            if [ $? -ne 0 ]; then
              echo "Directory ~/$REPO_NAME does not exist. Exiting."
              exit 1
            fi

            # 2. Download ONLY the docker-compose file
            # Note: Use GITHUB_TOKEN for private repos
            wget --header="Authorization: token ${{ secrets.GITHUB_TOKEN }}"  \
            -O docker-compose.yml $(gh api repos/${{ github.repository }}/contents/docker-compose.prod.yml | jq -r .download_url)


            # 3. Authenticate and Setup .env
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Ensure .env exists (or create it) before sed
            if [ ! -f .env ]; then
              echo ".env file not found"
              exit 1
            else
              sed -i "s/^VERSION=.*/VERSION=$APP_VERSION/" .env
            fi

            # 4. Pull and Deploy
            VERSION=$APP_VERSION docker compose pull
            VERSION=$APP_VERSION docker compose up -d --remove-orphans